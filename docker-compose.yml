services:
  findash:
    build: .
    image: findash
    container_name: findash
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # Secrets/config — read-only. JWT_SECRET, WEBHOOK_SECRET, AUTH_*, DATABASE_URL.
      - ./server-py/.env:/app/server-py/.env:ro
      # SQLite database — read-write so data persists across restarts.
      # DATABASE_URL=file:./dev.db resolves to /app/server-py/dev.db.
      - ./server-py/dev.db:/app/server-py/dev.db
